<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarberShop – Agendamentos</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 3l6 6 6-6"/>
          <path d="M6 21l6-6 6 6"/>
          <line x1="12" y1="9" x2="12" y2="15"/>
        </svg>
        BarberShop
      </div>
      <nav>
        <button class="nav-btn active" onclick="mostrarAba('agendar')">Agendar</button>
        <button class="nav-btn" onclick="mostrarAba('agenda')">Agenda</button>
      </nav>
    </div>
  </header>

  <main>

    <section id="aba-agendar" class="aba ativa">
      <div class="card">
        <h2>Novo Agendamento</h2>

        <div class="form-grid">
          <div class="form-group">
            <label for="nome">Nome do cliente</label>
            <input type="text" id="nome" placeholder="Ex: João Silva" />
          </div>

          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" placeholder="(11) 99999-9999" />
          </div>

          <div class="form-group">
            <label for="servico">Serviço</label>
            <select id="servico">
              <option value="Corte de cabelo">Corte de cabelo</option>
              <option value="Barba">Barba</option>
              <option value="Corte + Barba">Corte + Barba</option>
              <option value="Sobrancelha">Sobrancelha</option>
              <option value="Hidratação">Hidratação</option>
              <option value="Pigmentação">Pigmentação</option>
            </select>
          </div>

          <div class="form-group">
            <label for="data">Data</label>
            <input type="date" id="data" />
          </div>

          <div class="form-group">
            <label for="horario">Horário</label>
            <select id="horario">
              <option value="">Selecione uma data primeiro</option>
            </select>
          </div>
        </div>

        <div id="msg-form" class="msg" style="display:none"></div>

        <button class="btn-primary" onclick="agendarHorario()">Confirmar agendamento</button>
      </div>
    </section>

    <section id="aba-agenda" class="aba">
      <div class="card">
        <div class="agenda-header">
          <h2>Agenda</h2>
          <input type="date" id="filtro-data" onchange="carregarAgenda()" />
        </div>

        <div id="lista-agendamentos">
          <p class="vazio">Selecione uma data para ver os agendamentos.</p>
        </div>
      </div>
    </section>

  </main>

  <div id="modal-overlay" class="modal-overlay" style="display:none" onclick="fecharModal(event)">
    <div class="modal">
      <h3>Editar Agendamento</h3>

      <input type="hidden" id="edit-id" />

      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="edit-nome" />
      </div>
      <div class="form-group">
        <label>Telefone</label>
        <input type="tel" id="edit-telefone" />
      </div>
      <div class="form-group">
        <label>Serviço</label>
        <select id="edit-servico">
          <option value="Corte de cabelo">Corte de cabelo</option>
          <option value="Barba">Barba</option>
          <option value="Corte + Barba">Corte + Barba</option>
          <option value="Sobrancelha">Sobrancelha</option>
          <option value="Hidratação">Hidratação</option>
          <option value="Pigmentação">Pigmentação</option>
        </select>
      </div>
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="edit-data" />
      </div>
      <div class="form-group">
        <label>Horário</label>
        <input type="time" id="edit-horario" />
      </div>

      <div id="msg-modal" class="msg" style="display:none"></div>

      <div class="modal-actions">
        <button class="btn-secondary" onclick="document.getElementById('modal-overlay').style.display='none'">Cancelar</button>
        <button class="btn-primary" onclick="salvarEdicao()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
